<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DGVCL Estimate Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --navy:        #0a0f1e;
      --navy-2:      #0d1526;
      --navy-3:      #111d35;
      --blue:        #1e6fff;
      --blue-bright: #3d8bff;
      --blue-glow:   rgba(30,111,255,0.22);
      --blue-subtle: rgba(30,111,255,0.08);
      --text:        #e8edf5;
      --text-muted:  #7a8db0;
      --border:      rgba(255,255,255,0.07);
      --border-blue: rgba(30,111,255,0.30);
      --danger:      #ff4d6d;
      --success:     #00c9a7;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Background grid lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30,111,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,111,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(30,111,255,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 0 16px;
      position: relative;
      z-index: 1;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .logo-icon {
      width: 56px; height: 56px;
      background: var(--blue);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 30px var(--blue-glow);
      margin-bottom: 14px;
    }
    .login-logo h4 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin: 0;
    }
    .login-logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin: 4px 0 0;
    }
    .login-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
    .form-control {
      background: var(--navy-3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 14px;
    }
    .form-control:focus {
      background: var(--navy-3);
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
      color: var(--text);
    }
    .form-control::placeholder { color: rgba(122,141,176,0.5); }
    .btn-login {
      width: 100%;
      background: var(--blue);
      border: none;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      border-radius: 9px;
      box-shadow: 0 0 20px var(--blue-glow);
      transition: all 0.2s;
      margin-top: 6px;
    }
    .btn-login:hover { background: var(--blue-bright); box-shadow: 0 0 28px var(--blue-glow); }
    .input-group-text {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--text-muted);
    }
    .input-group .form-control { border-left: none; }
    .input-group:focus-within .input-group-text { border-color: var(--blue); }
    .alert { border-radius: 9px; font-size: 13px; border: 1px solid; margin-bottom: 20px; }
    .alert-danger  { background: rgba(255,77,109,0.1); color: var(--danger); border-color: rgba(255,77,109,0.25); }
    .alert-success { background: rgba(0,201,167,0.1);  color: var(--success); border-color: rgba(0,201,167,0.25); }
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-icon">⚡</div>
    <h4>Shreeji Electricals Limited</h4>
    <p>DGVCL Estimate Portal</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }}">
      <i class="bi bi-{{ 'exclamation-circle' if cat=='danger' else 'check-circle' }}-fill me-2"></i>{{ msg }}
    </div>
    {% endfor %}
  {% endwith %}

  <div class="login-card">
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label">USERNAME</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username"
                 autocomplete="username" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">PASSWORD</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password"
                 autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
  </div>

  <div class="footer-note">
    DGVCL Estimate Portal · Shreeji Electricals<br>
    <span style="color: rgba(122,141,176,0.4);">Powered by Flask + Supabase</span>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
