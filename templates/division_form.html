{% extends 'base.html' %}
{% block title %}Edit Division{% endblock %}
{% block page_title %}Edit Division{% endblock %}
{% block content %}
<div class="page-header"><h4>Edit Division</h4></div>
<div class="card" style="max-width:560px;">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-12"><label class="form-label">Division Name <span class="required-star">*</span></label>
          <input name="name" class="form-control" required value="{{ division.name }}"></div>
        <div class="col-12"><label class="form-label">Location</label>
          <input name="location" class="form-control" value="{{ division.location or '' }}"></div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary"><i class="bi bi-floppy me-1"></i>Update Division</button>
        <a href="{{ url_for('divisions') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
